<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Morse Potential</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 15px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        #graph { width: 100%; height: 600px; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #667eea; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Interactive Morse Potential Analysis</h1>
        <div id="graph"></div>
        <table>
            <thead><tr><th>Molecule</th><th>De (eV)</th><th>a (Å⁻¹)</th><th>Re (Å)</th></tr></thead>
            <tbody>
                <tr><td>H₂</td><td>4.52</td><td>1.93</td><td>0.7414</td></tr>
                <tr><td>HCl</td><td>4.43</td><td>1.94</td><td>1.2748</td></tr>
                <tr><td>N₂</td><td>9.76</td><td>2.69</td><td>1.0977</td></tr>
                <tr><td>O₂</td><td>5.12</td><td>2.66</td><td>1.2075</td></tr>
            </tbody>
        </table>
    </div>
    <script>
        function morsePotential(r, De, a, re) { return De * Math.pow(1 - Math.exp(-a * (r - re)), 2); }
        const molecules = { H2: {name: 'H₂', De: 4.52, a: 1.93, re: 0.7414}, HCl: {name: 'HCl', De: 4.43, a: 1.94, re: 1.2748}, N2: {name: 'N₂', De: 9.76, a: 2.69, re: 1.0977}, O2: {name: 'O₂', De: 5.12, a: 2.66, re: 1.2075} };
        const colors = ['#667eea', '#ef5350', '#66bb6a', '#ab47bc'];
        const traces = [];
        Object.keys(molecules).forEach((key, i) => {
            const mol = molecules[key];
            const rValues = Array.from({length: 1000}, (_, j) => 0.3 + (j/1000)*(4-0.3));
            const energyValues = rValues.map(r => morsePotential(r, mol.De, mol.a, mol.re));
            traces.push({ x: rValues, y: energyValues, mode: 'lines', name: mol.name, line: {color: colors[i], width: 3} });
        });
        const layout = { title: 'Morse Potential Energy vs Bond Length', xaxis: {title: 'Bond Length (Å)'}, yaxis: {title: 'Potential Energy (eV)'}, hovermode: 'closest' };
        Plotly.newPlot('graph', traces, layout);
    </script>
</body>
</html>
